services:
  backend-data-init:
    image: busybox@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
    command: ["sh", "-c", "chown -R 1654:1654 /app/data"]
    network_mode: none
    volumes:
      - career-assistant-data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN

  backend:
    build:
      context: .
      dockerfile: src/backend/CareerAssistant.Api/Dockerfile
    depends_on:
      backend-data-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection:-Data Source=/app/data/CareerAssistant.db}
      AI__Provider: ${AI__Provider:-Mock}
      AI__Model: ${AI__Model:-gpt-5-mini}
      AI__BaseUrl: ${AI__BaseUrl:-https://api.openai.com/v1}
      AI__TimeoutSeconds: ${AI__TimeoutSeconds:-60}
      Database__MigrateOnStartup: ${Database__MigrateOnStartup:-true}
      ForwardedHeaders__Enabled: ${ForwardedHeaders__Enabled:-true}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:5173}
      Logging__LogLevel__Default: ${LOGGING_LEVEL_DEFAULT:-Information}
      Logging__LogLevel__Microsoft.AspNetCore: ${LOGGING_LEVEL_MICROSOFT_ASPNETCORE:-Warning}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-5117}:8080"
    volumes:
      - career-assistant-data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-http://backend:8080}
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /etc/nginx/conf.d:uid=101,gid=101,mode=755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  career-assistant-data:
