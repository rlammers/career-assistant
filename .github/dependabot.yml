version: 2

updates:
  - package-ecosystem: "nuget"
    directory: "/src/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Pacific/Auckland"
    open-pull-requests-limit: 5
    groups:
      dotnet-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/src/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Pacific/Auckland"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Pacific/Auckland"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/src/backend/CareerAssistant.Api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "Pacific/Auckland"
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/src/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Pacific/Auckland"
    open-pull-requests-limit: 3
