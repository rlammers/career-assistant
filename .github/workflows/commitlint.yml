name: Conventional commits

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install Commitlint
        working-directory: src/frontend
        run: npm ci --ignore-scripts

      - name: Validate pull request commits
        working-directory: src/frontend
        run: ./node_modules/.bin/commitlint --from "origin/${{ github.event.pull_request.base.ref }}" --to "${{ github.event.pull_request.head.sha }}" --verbose
