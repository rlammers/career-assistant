name: Deployment readiness security

on:
  schedule:
    - cron: "17 14 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend-dependency-audit:
    name: Audit frontend dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci --ignore-scripts

      - name: Audit frontend dependencies
        working-directory: src/frontend
        run: npm audit --audit-level=high

  backend-dependency-audit:
    name: Audit backend dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        working-directory: src/backend
        run: dotnet restore

      - name: Audit backend dependencies
        working-directory: src/backend
        run: dotnet list package --vulnerable --include-transitive --no-restore

  bicep-compilation:
    name: Compile Bicep templates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Compile and lint Bicep
        run: |
          az bicep install
          az bicep build --file infra/azure/foundation.bicep --stdout > /dev/null
          az bicep build --file infra/azure/application.bicep --stdout > /dev/null
          az bicep build --file infra/azure/private-application.bicep --stdout > /dev/null

  secret-scan:
    name: Scan repository secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Scan repository secrets
        run: docker run --rm --volume "$PWD:/repo" zricethezav/gitleaks:v8.30.0 detect --source=/repo --redact --no-banner

  filesystem-scan:
    name: Scan filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Scan filesystem vulnerabilities and misconfigurations
        run: docker run --rm --volume "$PWD:/work" aquasec/trivy:0.69.3 fs --scanners vuln,misconfig --severity HIGH,CRITICAL --exit-code 1 /work

  backend-image-scan:
    name: Build and scan backend image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build backend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: src/backend/CareerAssistant.Api/Dockerfile
          load: true
          tags: career-assistant-backend:security-review
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Scan backend image
        run: docker run --rm --volume /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.69.3 image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 career-assistant-backend:security-review

  frontend-image-scan:
    name: Build and scan frontend image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: src/frontend/Dockerfile
          load: true
          push: false
          tags: career-assistant-frontend:security-review
          build-args: |
            VITE_AUTH_ENABLED=true
            VITE_ENTRA_TENANT_ID=11111111-1111-1111-1111-111111111111
            VITE_ENTRA_SPA_CLIENT_ID=22222222-2222-2222-2222-222222222222
            VITE_ENTRA_API_SCOPE=api://33333333-3333-3333-3333-333333333333/access_as_user
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

      - name: Scan frontend image
        run: docker run --rm --volume /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.69.3 image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 career-assistant-frontend:security-review
